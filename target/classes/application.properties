# 服务配置
server.port=${SERVER_PORT:8080}

# MySQL 配置
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/timecho_workorder?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA 配置
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JSON 序列化
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# 日志配置
logging.level.org.springframework=INFO
logging.level.com.timecho.workorder=DEBUG

# SLA监控任务
sla.monitor.delay-ms=${SLA_MONITOR_DELAY_MS:60000}
